# Example Custom Resource Definition and instances
# These are optional - they demonstrate how CRDs are handled
---
# CustomResourceDefinition for SimpleResource
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: simpleresources.example.com
spec:
  group: example.com
  scope: Namespaced
  names:
    kind: SimpleResource
    plural: simpleresources
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              message:
                type: string
              value:
                type: integer
---
# SimpleResource instances (enemies in the game)
apiVersion: example.com/v1
kind: SimpleResource
metadata:
  name: simple-resource-1
  namespace: default
spec:
  message: "Enemy 1"
  value: 10
