---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: workers-rs
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      tier: workers
  template:
    metadata:
      labels:
        tier: workers
    spec:
      containers:
      - name: workers
        image: busybox:1.36
        command: [ "sh", "-c", "while true; do sleep 3600; done" ]
